<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>对话评价</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <div class="container page">
    <div class="progress"><div class="progress-bar" id="progBar"></div></div>

    <h1 id="title">📝 对话评价</h1>
    <p style="color:#6b7280;">请根据您刚才与 <b id="aiNameInline"></b> 的对话感受作答</p>

    <div class="card" style="background:#fef3c7;border-color:#fde68a;">
      <p style="margin:0;color:#92400e;font-size:14px;">⚠️ <b>填写说明</b>：7分量表的中间值 (4分) 代表"一般/中立"。请根据真实感受选择，<b>避免所有题目都选相同分值</b>——系统会识别无差别作答并予以剔除。</p>
    </div>

    <form id="surveyForm"></form>

    <div class="btn-bar">
      <button class="btn btn-block" id="nextBtn" disabled onclick="submitSurvey()">提交评价 →</button>
    </div>
  </div>

  <script src="assets/state.js"></script>
  <script src="assets/scenarios.js"></script>
  <script src="assets/survey-data.js"></script>
  <script src="assets/api.js"></script>
  <script>
    // 进入时 phase 校验
    const aiIdx = State.get('current_ai_index') || 0;
    const neededPhase = aiIdx === 0 ? 'chat_1' : 'chat_2';
    if (!State.validatePhase(neededPhase)) {
      // validatePhase 会自动重置并跳转
    } else {
      initSurvey();
    }

    function initSurvey() {
      const aiType = State.getCurrentAi();
      const aiInfo = AiInfo[aiType];
      const isFirst = (State.get('current_ai_index') || 0) === 0;
      document.getElementById('aiNameInline').textContent = aiInfo.name;
      document.getElementById('title').textContent = `📝 ${aiInfo.name} 评价（${isFirst ? '1/2' : '2/2'}）`;
      document.getElementById('progBar').style.width = isFirst ? '55%' : '85%';

      const form = document.getElementById('surveyForm');

      // ---- 注意力检查 ----
      let html = `<div class="card"><h3>① 阅读检查</h3><div class="scale-question">${SurveyData.attentionCheck.q}</div><div class="radio-group">`;
      SurveyData.attentionCheck.options.forEach(opt => {
        html += `<label class="radio-item"><input type="radio" name="attention_check" value="${opt.value}">${opt.label}</label>`;
      });
      html += `</div></div>`;

      // ---- 风格操控检验 ----
      html += `<h2 style="margin-top:24px;">② 您对 AI 助手的整体感受</h2>`;
      SurveyData.styleMC.forEach((item, idx) => {
        html += renderScale(item, `style_mc_${idx+1}`);
      });

      // ---- 乐趣 ----
      html += `<h2 style="margin-top:24px;">③ 您对交互过程的感受</h2>`;
      SurveyData.pleasure.forEach((item, idx) => {
        html += renderScale(item, `pleasure_${idx+1}`);
      });

      // ---- 努力 ----
      SurveyData.effort.forEach((item, idx) => {
        html += renderScale(item, `effort_${idx+1}`);
      });

      // ---- 感知效率与控制感 ----
      html += `<h2 style="margin-top:24px;">④ 您对 AI 服务效率与过程控制的评价</h2>`;
      SurveyData.efficiency.forEach((item, idx) => {
        html += renderScale(item, `efficiency_${idx+1}`);
      });
      SurveyData.control.forEach((item, idx) => {
        html += renderScale(item, `control_${idx+1}`);
      });

      // ---- 支付意愿（滑块） ----
      const ws = SurveyData.wtpSlider;
      html += `<h2 style="margin-top:24px;">⑤ 您的支付意愿</h2>`;
      html += `<div class="card"><div class="scale-question">${ws.q}</div><div class="slider-wrap"><input type="range" class="slider-input" id="${ws.id}" min="${ws.min}" max="30" value="15" oninput="updateSlider()"><div class="slider-labels"><span>${ws.min} ${ws.unit}</span><span>${ws.max} ${ws.unit}</span></div><div class="slider-value" id="${ws.id}_v">15 元</div></div></div>`;

      // ---- 支付意愿（量表） ----
      SurveyData.wtp.forEach((item, idx) => {
        html += renderScale(item, `wtp_${idx+1}`);
      });

      form.innerHTML = html;

      function renderScale(item, name) {
        let opts = '<div class="scale-options">';
        for (let i=1; i<=7; i++) {
          opts += `<div class="scale-option"><input type="radio" name="${name}" id="${name}_${i}" value="${i}"><label for="${name}_${i}">${i}</label></div>`;
        }
        opts += '</div>';
        return `<div class="card"><div class="scale-question">${item.q}</div><div class="scale-labels"><span>${item.left}</span><span>${item.right}</span></div>${opts}</div>`;
      }

      let sliderTouched = false;
      window.updateSlider = function() {
        const v = document.getElementById('wtp_slider').value;
        document.getElementById('wtp_slider_v').textContent = `${v} 元`;
        sliderTouched = true;
        checkComplete();
      };

      window.checkComplete = function() {
        const allScales = [
          'attention_check',
          ...SurveyData.styleMC.map((_,i)=>`style_mc_${i+1}`),
          ...SurveyData.pleasure.map((_,i)=>`pleasure_${i+1}`),
          ...SurveyData.effort.map((_,i)=>`effort_${i+1}`),
          ...SurveyData.efficiency.map((_,i)=>`efficiency_${i+1}`),
          ...SurveyData.control.map((_,i)=>`control_${i+1}`),
          ...SurveyData.wtp.map((_,i)=>`wtp_${i+1}`)
        ];
        const allFilled = allScales.every(n => document.querySelector(`input[name="${n}"]:checked`));
        document.getElementById('nextBtn').disabled = !(allFilled && sliderTouched);
      };
      form.addEventListener('change', window.checkComplete);
    }

    async function submitSurvey() {
      const aiType = State.getCurrentAi();
      const data = { ai_type: aiType };
      data.attention_check = parseInt(document.querySelector('input[name="attention_check"]:checked').value);
      SurveyData.styleMC.forEach((_,i) => data[`style_mc_${i+1}`] = parseInt(document.querySelector(`input[name="style_mc_${i+1}"]:checked`).value));
      SurveyData.pleasure.forEach((_,i) => data[`pleasure_${i+1}`] = parseInt(document.querySelector(`input[name="pleasure_${i+1}"]:checked`).value));
      SurveyData.effort.forEach((_,i) => data[`effort_${i+1}`] = parseInt(document.querySelector(`input[name="effort_${i+1}"]:checked`).value));
      SurveyData.efficiency.forEach((_,i) => data[`efficiency_${i+1}`] = parseInt(document.querySelector(`input[name="efficiency_${i+1}"]:checked`).value));
      SurveyData.control.forEach((_,i) => data[`control_${i+1}`] = parseInt(document.querySelector(`input[name="control_${i+1}"]:checked`).value));
      data.wtp_slider = parseInt(document.getElementById('wtp_slider').value);
      SurveyData.wtp.forEach((_,i) => data[`wtp_${i+1}`] = parseInt(document.querySelector(`input[name="wtp_${i+1}"]:checked`).value));

      State.saveSurvey(aiType, data);

      // 离开时设置 phase
      const surveyPhase = (State.get('current_ai_index') || 0) === 0 ? 'survey_1' : 'survey_2';

      // 进入下一阶段
      State.nextAi();
      if (State.hasMoreAi()) {
        State.setPhase(surveyPhase);
        navigate('transition.html');
      } else {
        // 全部完成 → 提交
        await finalSubmit();
        navigate('thanks.html');
      }
    }

    async function finalSubmit() {
      const all = State.getAll();
      const payload = {
        subject_id: all.subject_id,
        start_time: all.start_time,
        finish_time: new Date().toISOString(),
        gender: all.gender,
        age_group: all.age_group,
        ai_usage_freq: all.ai_usage_freq,
        scenario: all.scenario,
        ai_order: all.ai_order,
        user_agent: all.user_agent,
        scenario_mc: all.scenario_mc,
        survey_exp: all.survey_exp,
        survey_util: all.survey_util
      };
      try {
        const res = await API.submitSurvey(payload);
        if (res.taskCode) State.set('task_code', res.taskCode);
      } catch(e) { console.error(e); }
    }
  </script>
</body>
</html>
