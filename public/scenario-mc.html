<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>场景理解</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <div class="container page">
    <div class="progress"><div class="progress-bar" style="width:35%;"></div></div>

    <h1>📝 场景理解</h1>
    <p style="color:#6b7280;">基于刚才阅读的场景，请回答以下3个问题。答案没有对错区分，只要根据您的真实感觉选择即可</p>

    <div class="card card-scenario" id="scenarioRecap"></div>

    <form id="mcForm" style="margin-top:20px;"></form>

    <div class="btn-bar">
      <button class="btn btn-block" id="nextBtn" disabled onclick="submitMC()">继续 → 与 AI 助手对话</button>
    </div>
  </div>

  <!-- 任务描述弹窗 -->
  <div class="modal-overlay" id="goalModal">
    <div class="modal-box">
      <div class="modal-header">
        <span>🎯 您的任务目标</span>
        <button class="modal-close" id="modalCloseBtn">×</button>
      </div>
      <div class="modal-body" id="goalContent"></div>
    </div>
  </div>

  <script src="assets/state.js"></script>
  <script src="assets/scenarios.js"></script>
  <script src="assets/survey-data.js"></script>
  <script>
    // 进入时校验：必须已完成 scenario 阅读
    if (!State.validatePhase('scenario_read')) {
      // validatePhase 会自动重置并跳转
    } else {
      initPage();
    }

    function initPage() {
      const sc = Scenarios[State.get('scenario')];
      // 只显示标题，不显示"回顾：xxx"
      document.getElementById('scenarioRecap').innerHTML = `<h3 style="margin:0;cursor:pointer;" id="scTitle">${sc.title}</h3>`;

      // 点击区域打开任务描述弹窗
      document.getElementById('scenarioRecap').addEventListener('click', () => {
        showGoal();
      });

      // 弹窗相关
      window.showGoal = function() {
        document.getElementById('goalContent').innerHTML = sc.content;
        document.getElementById('goalModal').style.display = 'flex';
      };
      window.hideGoal = function() {
        document.getElementById('goalModal').style.display = 'none';
      };
      document.getElementById('modalCloseBtn').addEventListener('click', window.hideGoal);
      document.getElementById('goalModal').addEventListener('click', (e) => {
        if (e.target === document.getElementById('goalModal')) window.hideGoal();
      });

      // 渲染题目
      const form = document.getElementById('mcForm');
      SurveyData.scenarioMC.forEach((item, idx) => {
        let scaleHtml = `<div class="scale-options">`;
        for (let i=1; i<=7; i++) {
          scaleHtml += `<div class="scale-option"><input type="radio" name="${item.id}" id="${item.id}_${i}" value="${i}"><label for="${item.id}_${i}">${i}</label></div>`;
        }
        scaleHtml += `</div>`;
        form.innerHTML += `<div class="card"><div class="scale-question"><b>Q${idx+1}.</b> ${item.q}</div><div class="scale-labels"><span>${item.left}</span><span>${item.right}</span></div>${scaleHtml}</div>`;
      });

      function checkComplete() {
        const ok = SurveyData.scenarioMC.every(item => document.querySelector(`input[name="${item.id}"]:checked`));
        document.getElementById('nextBtn').disabled = !ok;
      }
      form.addEventListener('change', checkComplete);
    }

    function submitMC() {
      const data = {};
      SurveyData.scenarioMC.forEach(item => {
        data[item.id] = parseInt(document.querySelector(`input[name="${item.id}"]:checked`).value);
      });
      State.set('scenario_mc', data);
      State.setPhase('scenario_mc');
      navigate('chat.html');
    }
  </script>
</body>
</html>
