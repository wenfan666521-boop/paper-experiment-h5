<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>AI服务用户体验研究</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <div class="container page">
    <div style="text-align:center;padding:40px 20px 30px;">
      <div style="font-size:60px;margin-bottom:20px;">🔬</div>
      <h1 style="font-size:24px;line-height:1.4;">AI服务的用户体验研究</h1>
      <p style="color:#6b7280;margin-top:12px;">真实对话 · 真实体验 · 约 10-15 分钟</p>
    </div>

    <div class="card card-info">
      <h2 style="margin-top:0;color:#1e40af;">📖 关于本研究</h2>
      <p>感谢您参与本次研究！本研究希望了解用户在不同场景下，对于平台 AI 服务的真实感受与评价。</p>
      <p>您将先后与<strong>两位风格不同的 AI 助手</strong>进行真实对话，每次对话后独立完成一份评价问卷。</p>
      <p style="font-size:14px;color:#6b7280;">⚠️ 两次评价使用的量表完全相同，请按<strong>当次的实际感受</strong>作答，无需刻意对比两位助手。</p>
    </div>

    <div class="card">
      <h2 style="margin-top:0;">📋 流程说明</h2>
      <p>① 填写基本信息（约1分钟）</p>
      <p>② 阅读场景背景</p>
      <p>③ 与 AI 助手A 对话（最少6轮）→ <strong>完成第1次评价</strong></p>
      <p>④ 与 AI 助手B 对话（最少6轮）→ <strong>完成第2次评价</strong></p>
      <p>⑤ 任务完成 → 获得任务码</p>
    </div>

    <div class="btn-bar">
      <button class="btn btn-block" onclick="navigate('consent.html')">开始研究 →</button>
    </div>
  </div>

  <script src="assets/state.js"></script>
  <script>
    // 从首页进入时，如果之前有实验进度则强制重置
    if (State.getPhase() !== 'init') {
      State.resetExperiment();
    }
  </script>
</body>
</html>
