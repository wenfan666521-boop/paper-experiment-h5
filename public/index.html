<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>AI服务用户体验研究</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <div class="container page">
    <div style="text-align:center;padding:40px 20px 30px;">
      <div style="font-size:60px;margin-bottom:20px;">🔬</div>
      <h1 style="font-size:24px;line-height:1.4;">AI服务的用户体验研究</h1>
      <p style="color:#6b7280;margin-top:12px;">真实对话 · 真实体验 · 约 10-15 分钟</p>
    </div>

    <div class="card card-info">
      <h2 style="margin-top:0;color:#1e40af;">📖 关于本研究</h2>
      <p>感谢您参与本次研究！本研究希望了解用户在不同场景下，对于平台 AI 服务的真实感受与评价。</p>
      <p>您将经历一个旅行规划场景，并真实地与两个不同的 AI 助手对话，每次对话后填写简短问卷。</p>
    </div>

    <div class="card">
      <h2 style="margin-top:0;">📋 流程说明</h2>
      <p>① 填写基本信息（约1分钟）</p>
      <p>② 阅读场景背景</p>
      <p>③ 与 AI 助手A 对话（最少5轮） + 评价</p>
      <p>④ 与 AI 助手B 对话（最少5轮） + 评价</p>
      <p>⑤ 完成 → 获得任务码</p>
    </div>

    <div class="btn-bar">
      <button class="btn btn-block" onclick="navigate('consent.html')">开始研究 →</button>
    </div>
  </div>

  <script src="assets/state.js"></script>
</body>
</html>
