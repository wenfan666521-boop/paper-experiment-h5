<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>AI 对话</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <div class="chat-page">
    <div class="chat-header">
      <div class="chat-avatar" id="avatar"></div>
      <div class="chat-title">
        <div class="chat-name" id="aiName"></div>
        <div class="chat-status" id="aiSub"></div>
      </div>
      <button class="goal-btn" id="goalBtn" title="查看任务目标" onclick="window.showGoal && window.showGoal()">任务目标</button>
      <div class="chat-rounds" id="rounds">0 / 6 轮</div>
    </div>
    <div class="goal-hint">点击“任务目标”按钮可重新查看任务目标。</div>

    <!-- 目标弹窗 -->
    <div class="modal-overlay" id="goalModal">
      <div class="modal-box">
        <div class="modal-header">
          <span>🎯 您的任务目标</span>
          <button class="modal-close" id="modalCloseBtn" onclick="window.hideGoal()">×</button>
        </div>
        <div class="modal-body" id="goalContent"></div>
      </div>
    </div>

    <div class="chat-body" id="chatBody"></div>

    <div class="chat-finish-bar" id="finishBar" style="display:none;">
      <button class="btn btn-block" id="finishBtn">✅ 完成对话，开始评价</button>
    </div>

    <div class="chat-input">
      <textarea id="msgInput" placeholder="输入消息..." rows="1"></textarea>
      <button class="chat-send" id="sendBtn" aria-label="发送">↑</button>
    </div>
  </div>

  <script src="assets/state.js"></script>
  <script src="assets/scenarios.js"></script>
  <script src="assets/api.js"></script>
  <script>
    const MIN_ROUNDS = 6;

    // 进入时 phase 校验：必须从正确的上一步来
    const aiIdx = State.get('current_ai_index') || 0;
    const neededPhase = aiIdx === 0 ? 'scenario_mc' : 'survey_1';
    if (!State.validatePhase(neededPhase)) {
      // validatePhase 会自动重置并跳转
    } else {
      initChat();
    }

    function initChat() {
      const aiType = State.getCurrentAi();
      const subjectId = State.get('subject_id');
      const aiInfo = AiInfo[aiType];
      const scenarioInfo = Scenarios[State.get('scenario')];

      // 初始化UI
      const avatarEl = document.getElementById('avatar');
      avatarEl.className = `chat-avatar ${aiType}`;
      if (aiInfo.avatar.match(/\.(png|jpg|jpeg|gif|webp|svg)$/i)) {
        avatarEl.innerHTML = `<img src="${aiInfo.avatar}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;" alt="">`;
      } else {
        avatarEl.textContent = aiInfo.avatar;
      }
      document.getElementById('aiName').textContent = aiInfo.name;
      document.getElementById('aiSub').textContent = aiInfo.subtitle;

      // 对话状态
      window._messages = [];
      window._userTurns = 0;
      window._isWaiting = false;
      window._hasPlanTriggered = false;

      const body = document.getElementById('chatBody');
      const input = document.getElementById('msgInput');
      const sendBtn = document.getElementById('sendBtn');
      const roundsEl = document.getElementById('rounds');
      const finishBar = document.getElementById('finishBar');

      // 系统消息显示场景提示
      addMsg(body, 'system', `你正在以「${scenarioInfo.title}」中主人公的身份与 AI 对话`);

      // 初始问候
      addLoading(body);
      setTimeout(async () => {
        removeLoading(body);
        const greeting = aiType === 'exp'
          ? '我是星程 🌟 很高兴认识你！是你的贴心小助手，可以帮你快速订机票订酒店，确定行程~'
          : '您好，我是您的出行助手，可以引导您快速订机票订酒店，确定差旅行程。有任何问题，请按照提示进行回复';
        addMsg(body, 'assistant', greeting);
        window._messages.push({ role: 'assistant', content: greeting });
        API.logMessage(subjectId, aiType, 0, 'assistant', greeting);
      }, 600);

      // 自动调整 textarea 高度
      input.addEventListener('input', () => {
        input.style.height = 'auto';
        input.style.height = Math.min(input.scrollHeight, 80) + 'px';
      });

      // 发送
      sendBtn.onclick = () => sendMessage(body, input, sendBtn, aiType, subjectId);
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey && !window._isWaiting) {
          e.preventDefault();
          sendMessage(body, input, sendBtn, aiType, subjectId);
        }
      });

      document.getElementById('finishBtn').onclick = () => {
        State.set(`chat_${aiType}_messages`, window._messages);
        State.set(`chat_${aiType}_turns`, window._userTurns);
        if (API.cacheStateSnapshot) API.cacheStateSnapshot();
        // 离开时设置 phase
        const chatPhase = aiIdx === 0 ? 'chat_1' : 'chat_2';
        State.setPhase(chatPhase);
        navigate('survey.html');
      };
    }

    async function sendMessage(body, input, sendBtn, aiType, subjectId) {
      const text = input.value.trim();
      if (!text || window._isWaiting) return;

      window._isWaiting = true;
      sendBtn.disabled = true;

      addMsg(body, 'user', text);
      window._messages.push({ role: 'user', content: text });
      window._userTurns++;
      updateRounds(body, window._userTurns);
      input.value = '';
      input.style.height = 'auto';

      API.logMessage(subjectId, aiType, window._userTurns, 'user', text);

      addLoading(body);
      const t0 = Date.now();
      try {
        const reply = await API.chat(aiType, window._messages, subjectId);
        removeLoading(body);
        
        // 判断是否为JSON（表单配置）
        if (isJsonForm(reply)) {
          const formData = JSON.parse(reply);
          renderForm(body, formData, aiType, subjectId);
        } else {
          addMsg(body, 'assistant', reply);
          window._messages.push({ role: 'assistant', content: reply });
          if (reply.includes('出行方案')) window._hasPlanTriggered = true;
          API.logMessage(subjectId, aiType, window._userTurns, 'assistant', reply, Date.now() - t0);
        }
      } catch (e) {
        removeLoading(body);
        const errMsg = e.message || '';
        if (errMsg.includes('inappropriate') || errMsg.includes('Inappropriate')) {
          addMsg(body, 'system', '⚠️ 系统繁忙，请稍后重试或换种措辞继续提问');
        } else {
          addMsg(body, 'system', '⚠️ 网络出了点问题，请重试');
        }
      } finally {
        window._isWaiting = false;
        sendBtn.disabled = false;
        input.focus();
      }
    }

    // 判断是否为JSON表单配置
    function isJsonForm(text) {
      try {
        const data = JSON.parse(text);
        return data.type === 'form' && data.step && data.fields;
      } catch {
        return false;
      }
    }

    // 渲染表单
    function renderForm(body, formData, aiType, subjectId) {
      const div = document.createElement('div');
      div.className = 'msg assistant form-msg';
      
      // 表单标题
      let html = `<div class="form-title">${formData.title}</div>`;
      html += `<div class="form-desc">${formData.description}</div>`;
      
      // 渲染字段
      formData.fields.forEach(field => {
        const required = field.required ? '<span class="required">*</span>' : '';
        html += `<div class="form-field">`;
        html += `<div class="form-label">${field.label}${required}</div>`;
        
        if (field.type === 'radio') {
          html += `<div class="form-options">`;
          field.options.forEach((opt, idx) => {
            html += `<label class="form-option">`;
            html += `<input type="radio" name="${field.id}" value="${opt.value}" ${idx === 0 ? 'checked' : ''}>`;
            html += `<span>${opt.label}</span>`;
            html += `</label>`;
          });
          html += `</div>`;
        } else if (field.type === 'checkbox') {
          html += `<div class="form-options">`;
          field.options.forEach((opt, idx) => {
            html += `<label class="form-option">`;
            html += `<input type="checkbox" name="${field.id}" value="${opt.value}">`;
            html += `<span>${opt.label}</span>`;
            html += `</label>`;
          });
          html += `</div>`;
        }
        
        html += `</div>`;
      });
      
      // 提交按钮
      html += `<button class="btn btn-block form-submit-btn" onclick="submitForm(this, '${aiType}', '${subjectId}', ${formData.step})">确认提交</button>`;
      
      div.innerHTML = html;
      body.appendChild(div);
      body.scrollTop = body.scrollHeight;
    }

    // 提交表单
    async function submitForm(btn, aiType, subjectId, step) {
      const formEl = btn.parentElement;
      const formData = {};
      
      // 收集表单数据
      const radioInputs = formEl.querySelectorAll('input[type="radio"]:checked');
      radioInputs.forEach(input => {
        formData[input.name] = input.value;
      });
      
      const checkboxInputs = formEl.querySelectorAll('input[type="checkbox"]:checked');
      checkboxInputs.forEach(input => {
        if (!formData[input.name]) formData[input.name] = [];
        formData[input.name].push(input.value);
      });
      
      // 禁用按钮
      btn.disabled = true;
      btn.textContent = '提交中...';
      
      // 发送表单数据
      const body = document.getElementById('chatBody');
      addLoading(body);
      
      try {
        const submitData = JSON.stringify({
          type: 'form_submit',
          step: step,
          data: formData
        });
        
        // 添加到消息历史
        window._messages.push({ role: 'user', content: submitData });
        window._userTurns++;
        updateRounds(body, window._userTurns);
        
        // 调用AI
        const reply = await API.chat(aiType, window._messages, subjectId);
        removeLoading(body);
        
        // 判断是否为JSON（表单配置）
        if (isJsonForm(reply)) {
          const newFormData = JSON.parse(reply);
          renderForm(body, newFormData, aiType, subjectId);
        } else {
          addMsg(body, 'assistant', reply);
          window._messages.push({ role: 'assistant', content: reply });
          if (reply.includes('出行方案')) window._hasPlanTriggered = true;
          API.logMessage(subjectId, aiType, window._userTurns, 'assistant', reply, Date.now() - t0);
        }
      } catch (e) {
        removeLoading(body);
        addMsg(body, 'system', '⚠️ 提交失败，请重试');
        btn.disabled = false;
        btn.textContent = '确认提交';
      }
    }

    function addMsg(body, role, content) {
      const div = document.createElement('div');
      div.className = `msg ${role}`;
      div.textContent = content;
      body.appendChild(div);
      body.scrollTop = body.scrollHeight;
    }

    function addLoading(body) {
      const div = document.createElement('div');
      div.id = 'loadingMsg';
      div.className = 'msg loading';
      div.innerHTML = '<span class="dots"><span></span><span></span><span></span></span>';
      body.appendChild(div);
      body.scrollTop = body.scrollHeight;
    }

    function removeLoading(body) {
      const el = document.getElementById('loadingMsg');
      if (el) el.remove();
    }

    window.showGoal = function() {
      const sc = Scenarios[State.get('scenario')];
      const aiType = State.getCurrentAi();
      const rounds = window._userTurns || 0;
      const planHint = window._hasPlanTriggered
        ? '✅ 已触发出行方案'
        : '⏳ 需要触发出行方案';
      const progressHtml = `<div style="margin-top:12px;padding:10px 12px;background:#f0f9ff;border-radius:8px;font-size:14px;color:#1e40af;line-height:1.6;">
        <b>完成进度</b><br>
        对话轮数：${rounds} / 6 轮<br>
        ${planHint}
      </div>`;
      document.getElementById('goalContent').innerHTML = sc.content + progressHtml;
      document.getElementById('goalModal').style.display = 'flex';
    };
    window.hideGoal = function() {
      document.getElementById('goalModal').style.display = 'none';
    };
    document.getElementById('goalModal').addEventListener('click', (e) => {
      if (e.target === document.getElementById('goalModal')) window.hideGoal();
    });

    function updateRounds(body, userTurns) {
      const displayRounds = Math.min(userTurns, MIN_ROUNDS);
      document.getElementById('rounds').textContent = `${displayRounds} / ${MIN_ROUNDS} 轮`;
      if (userTurns >= MIN_ROUNDS) {
        document.getElementById('rounds').classList.add('done');
        if (window._hasPlanTriggered) {
          document.getElementById('finishBar').style.display = 'block';
        }
      }
    }
  </script>
</body>
</html>
